*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;overscroll-behavior:none;touch-action:manipulation;background:#ffffff;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background:#ffffff;color:var(--rds-ink);overflow:hidden;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
}
body::after{content:"";position:fixed;left:0;right:0;bottom:0;height:160px;background:#ffffff;z-index:-1;pointer-events:none;}
#finish-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:#111;flex-direction:column;align-items:center;justify-content:center;}
#finish-overlay.active{display:flex;}
#finish-overlay .finish-box{border-top:4px solid var(--rds-red);border-bottom:4px solid var(--rds-red);padding:22px 0;width:80%;max-width:420px;text-align:center;}
#finish-overlay .finish-text{color:#fff;font-weight:900;font-size:22px;letter-spacing:3px;text-transform:uppercase;}
.app{
  height:100vh;height:100dvh;display:flex;flex-direction:column;
  max-width:560px;margin:0 auto;background:#ffffff;
}
/* HEADER (negro con banner + subtitulo + filo rojo) */
header{width:100%;flex-shrink:0;background:#111;border-bottom:4px solid #b03020;display:flex;flex-direction:column;align-items:center;padding:0;}
header img{width:100%;height:auto;display:block;margin-bottom:0;}
.subtitle{display:block;width:100%;box-sizing:border-box;font-size:0.58rem;letter-spacing:0.14em;color:#cfcfcf;text-transform:none;padding:8px 0 8px;text-align:center;background:linear-gradient(rgba(0,0,0,0.34),rgba(0,0,0,0.34)),var(--carbon);background-size:cover;background-position:center;}
.home-title{
  font-weight:900;font-size:30px;line-height:1;letter-spacing:2px;
  text-align:center;text-transform:uppercase;color:#111111;margin:14px 0 2px;
}
/* SCREENS */
.screen{flex:1 1 auto;display:none;flex-direction:column;min-height:0;}
.screen.active{display:flex;}
.pad{padding:12px 16px 18px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#screen-home .pad{display:flex;flex-direction:column;flex:1;padding-top:8px;}
#screen-home .block-label{margin:8px 0 6px;}
#screen-home #mode-row,#screen-home #count-section,#screen-home #fallos-section{margin-top:14px;}

/* SELECTORES SEGMENTADOS */
.block-label{font-size:11px;letter-spacing:3px;font-weight:700;color:#aaaaaa;text-transform:uppercase;text-align:center;margin:16px 0 7px;}
.opt-row{display:flex;border:2px solid #000000;border-radius:4px;overflow:hidden;background:#f0f0f0;}
.opt-row.three,.opt-row.four{display:flex;}
.opt{
  flex:1 1 0;min-width:0;border:none;border-right:2px solid #000000;border-radius:0;
  background:#f0f0f0;color:#555555;padding:11px 4px;text-align:center;cursor:pointer;
  font-weight:900;font-size:13px;letter-spacing:1px;text-transform:uppercase;
  transition:background .12s ease,color .12s ease;
}
.opt:last-child{border-right:none;}
.opt small{display:block;font-size:10px;letter-spacing:.5px;color:#999999;font-weight:700;text-transform:uppercase;margin-top:2px;}
.opt:active{opacity:.92;}
.opt.sel{background:var(--rds-red);color:#fff;}
.opt.sel small{color:#f3d4cf;}
#count-row.locked{pointer-events:none;border-color:transparent;background:transparent;}
.btn.ghost.on{background:var(--rds-red);color:#fff;}
#count-row.locked .opt{visibility:hidden;border-right-color:transparent;background:transparent;}
#count-row.locked .opt.sel{visibility:visible;background:var(--rds-red);border-radius:6px;}
.opt-row.locked-fallos{pointer-events:none;}
.opt-row.locked-fallos .opt{opacity:.4;}
.opt-row.locked-fallos .opt.sel{opacity:1;}
.opt .inf-g{display:inline-block;transform:scale(2.3);font-weight:900;}

/* BOTONES */
.btn{
  display:block;width:100%;border:none;border-radius:6px;padding:11px;margin-top:8px;
  font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;text-align:center;background:#ffffff;color:#111111;
  transition:transform .12s ease,box-shadow .12s ease;
}
.btn:active{transform:translateY(2px);}
.btn.primary{background:var(--rds-red);color:#fff;box-shadow:0 3px 10px rgba(176,48,32,.22);}
.btn.primary:active{box-shadow:0 2px 8px rgba(176,48,32,.2);}
.btn.blue{background:var(--rds-red);color:#fff;}
.btn.ghost{background:#fff;color:#666666;border:1px solid #dddddd;font-size:13px;letter-spacing:1.5px;}
.btn.rank{background:#fff;color:var(--rds-red);border:2px solid var(--rds-red);font-size:14px;}
#res-home,#res-again,#rk-home,#rk-repeat{background:#111;color:#fff;border:none;}
#btn-start,#btn-goranking{width:60%;margin-left:auto;margin-right:auto;}
.home-logo{display:block;width:110px;max-width:36%;height:auto;margin:2px auto 6px;}
.home-name-wrap{width:52%;margin:18px auto 0;display:flex;flex-direction:column;align-items:center;}
.home-name-input{width:100%;box-sizing:border-box;border:2px solid var(--rds-red);border-radius:5px;padding:8px 10px;text-align:center;font-weight:700;font-size:14px;letter-spacing:1px;color:#111;text-transform:uppercase;background:#fff;}
.home-name-input:focus{outline:none;}
.home-name-btn{margin-top:-2px;width:64%;border:none;background:var(--rds-red);color:#fff;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 0;border-radius:0 0 5px 5px;cursor:pointer;}
.home-name-btn:active{transform:translateY(1px);}
.home-name-wrap{order:3;width:200px;max-width:90%;margin:6px auto 0;flex-direction:row;align-items:stretch;height:38px;gap:0;}
.home-ini-input{flex:1;min-width:0;height:100%;box-sizing:border-box;border:2px solid var(--rds-red);border-right:none;border-radius:5px 0 0 5px;text-align:center;font-weight:700;font-size:14px;letter-spacing:1px;color:#111;text-transform:uppercase;background:#fff;padding:0 6px;}
.home-ini-input:focus{outline:none;}
.home-sport-select{flex:1;min-width:0;height:100%;box-sizing:border-box;border:2px solid var(--rds-red);border-radius:0 5px 5px 0;font-weight:700;font-size:12px;color:#111;background:#fff;padding:0 8px;-webkit-appearance:none;appearance:none;}
.home-sport-select:focus{outline:none;}
.home-name-wrap .home-name-btn{margin-top:0;height:100%;width:auto;flex:0 0 auto;padding:0 14px;border-radius:0 5px 5px 0;font-size:11px;}
.start-ring{order:1;margin:5px auto 3px;padding:4px;border-radius:50%;background:conic-gradient(#ffffff,#9a9a9a,#e8e8e8,#5a5a5a,#ffffff,#8a8a8a,#dcdcdc,#666666,#ffffff);box-shadow:0 5px 12px rgba(0,0,0,0.6);display:flex;transition:transform 0.08s, box-shadow 0.08s;}.start-ring:active{transform:translateY(3px);box-shadow:0 2px 6px rgba(0,0,0,0.6);}#btn-start{width:70px;height:70px;border-radius:50%;padding:0;margin:0;background:radial-gradient(circle at 35% 30%, #e84030 0%, #b03020 45%, #7a1a10 100%);color:#fff;font-weight:900;font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:inset 0 2px 4px rgba(255,255,255,0.28), inset 0 -3px 6px rgba(0,0,0,0.5);transition:transform 0.08s;}
#btn-start:active{box-shadow:inset 0 3px 7px rgba(0,0,0,0.6);}
#btn-goranking{order:2;width:75%;height:auto;padding:9px;margin:6px auto 0;display:flex;align-items:center;justify-content:center;letter-spacing:.18em;border-radius:6px;}
.home-bottom{margin-top:auto;align-self:center;width:92%;box-sizing:border-box;margin-bottom:calc(16px + env(safe-area-inset-bottom, 0px));border:3px solid var(--rds-red);border-radius:10px;background-color:#222;background-image:linear-gradient(rgba(0,0,0,0.20),rgba(0,0,0,0.28)),var(--carbon);background-size:cover;background-position:center;background-repeat:no-repeat;padding:14px 12px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.home-bottom .tag-line{color:#cccccc;order:4;}
.mode-desc{
  background:#fff;border:1px solid #dddddd;border-radius:4px;
  padding:9px 12px;font-size:12px;line-height:1.35;margin-top:9px;color:#555555;text-align:center;
}
.mode-desc b{color:var(--rds-red);}

/* GAME */
#screen-game{position:relative;background-color:#FFFFFF;background-image:radial-gradient(circle, rgba(17,17,17,0.20) 1.1px, transparent 1.4px);background-size:20px 20px;}
.hud{
  position:absolute;top:0;left:0;right:0;z-index:5;
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:rgba(255,255,255,.94);border-bottom:1px solid #dddddd;
}
.hud .badge{
  font-weight:900;font-size:15px;letter-spacing:1px;
  padding:3px 10px;border:1px solid #dddddd;border-radius:4px;background:#fff;
}
.hud .badge.mode{background:var(--rds-red);color:#fff;border-color:var(--rds-red);}
.hud .badge.mode.red{background:var(--rds-red);}
.hud .spacer{flex:1;}
.hud .lives{display:flex;gap:6px;align-items:center;}
.hud .crono{color:var(--rds-red);font-weight:900;font-size:18px;letter-spacing:1px;font-variant-numeric:tabular-nums;}
.hud .life{width:12px;height:12px;border-radius:50%;background:var(--rds-red);box-shadow:0 0 4px rgba(176,48,32,.5);transition:opacity .1s ease,background .2s ease;}
.hud .life.lost{background:#dddddd;box-shadow:none;opacity:.45;}
.hud .life.blink-off{opacity:0;}
.hud .stat{font-weight:900;font-size:15px;letter-spacing:1px;text-align:center;line-height:1;}
.hud .stat small{display:none;font-size:9px;color:#999999;letter-spacing:.5px;font-weight:700;}
#screen-game.lim #stat-trial{display:none;}
#screen-game.lim #stat-idx{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;pointer-events:none;}
.hud .exit{
  font-weight:900;font-size:13px;letter-spacing:1px;
  padding:5px 10px;border:none;border-radius:4px;background:var(--rds-red);color:#fff;cursor:pointer;
}
.hud-progress{position:absolute;left:0;right:0;bottom:0;height:5px;background:#e9e9e9;}
#game-progress-fill{height:100%;width:0;background:var(--rds-red);transition:width .3s ease;}
.chart-card{border:1px solid #dddddd;background:#fff;padding:8px 8px 4px;margin-top:8px;}
.rt-chart{width:100%;height:150px;display:block;}
#play{display:block;width:100%;height:100%;touch-action:none;}
.center-msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:4;pointer-events:none;text-align:center;}
.center-msg span{font-weight:900;font-size:40px;letter-spacing:3px;color:var(--rds-red);background:rgba(255,255,255,.6);padding:8px 22px;border-radius:6px;}
.countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:6;background:rgba(0,0,0,.32);pointer-events:none;}
.countdown span{font-weight:900;font-size:88px;letter-spacing:2px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.45);}

/* RESULTS */
.result-hero{
  margin:10px 0 4px;border:1px solid #dddddd;border-top:4px solid var(--rds-red);
  background:#fff;color:#111;text-align:center;padding:16px;
}
.result-hero.fail{border-top-color:var(--rds-red);}
.result-hero .big{font-weight:900;font-size:54px;line-height:1;letter-spacing:1px;color:var(--rds-red);}
.result-hero .lbl{font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:#aaaaaa;}
.stat-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;margin-top:8px;background:#e0e0e0;border:1px solid #dddddd;}
.stat-card{border:none;background:#fff;text-align:center;padding:12px 4px;}
.stat-card .v{font-weight:900;font-size:26px;line-height:1;color:#111;}
.stat-card .v.red{color:var(--rds-red);}
.stat-card .v.blue{color:var(--rds-red);}
.stat-card .k{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#999999;font-weight:700;}
.save-row{display:flex;gap:0;margin-top:14px;border:1px solid #dddddd;}
.save-row input{
  flex:1;border:none;border-radius:0;padding:11px 12px;width:0;min-width:0;
  font-weight:700;font-size:16px;letter-spacing:1px;color:#111;text-transform:uppercase;background:#fff;
}
.save-row input:focus{outline:none;}
.save-row .rk-btn{background:#fff;color:var(--rds-red);border-left:1px solid #dddddd;font-size:12px;letter-spacing:.5px;padding:0 12px;}
.save-row button{
  flex:0 0 auto;border:none;border-left:1px solid #dddddd;border-radius:0;background:var(--rds-red);color:#fff;
  font-weight:900;font-size:14px;letter-spacing:1px;padding:14px 16px;cursor:pointer;text-transform:uppercase;
}
.save-row #res-save{flex:1;text-align:center;border-left:none;}
.null-note{
  margin-top:12px;border:1px solid #dddddd;border-radius:0;background:#fff;
  padding:12px;text-align:center;font-size:13px;color:#777777;font-weight:600;
}

/* RANKING */
.rk-filters{display:flex;border:1px solid #dddddd;border-radius:0;overflow:hidden;background:#fff;margin-bottom:10px;}
.rk-filters .opt{flex:1;padding:10px 4px;font-size:13px;background:#fff;color:#999999;border-right:1px solid #dddddd;}
.rk-filters .opt:last-child{border-right:none;}
.rk-filters .opt.sel{background:var(--rds-red);color:#fff;}
table.rk{width:100%;border-collapse:collapse;font-size:14px;}
table.rk th,table.rk td{border:1px solid #eeeeee;padding:7px 6px;text-align:center;}
table.rk th{background:var(--rds-red);color:#fff;font-weight:900;letter-spacing:1px;font-size:13px;border-color:var(--rds-red);text-transform:uppercase;}
table.rk td.nm{text-align:left;font-weight:700;letter-spacing:.5px;font-size:14px;color:#111;}
table.rk td.idx{font-weight:900;font-size:18px;color:var(--rds-red);}
table.rk tr.top1 td{background:#fff8e6;}
table.rk tr.top2 td{background:#f1f3f5;}
table.rk tr.top3 td{background:#f7efe7;}
.rk-empty{text-align:center;color:#cccccc;padding:24px;font-size:14px;letter-spacing:1px;}
.footer-actions{flex:0 0 auto;padding:12px 16px;border-top:1px solid #e0e0e0;background:#fff;}
.foot2{display:flex;gap:10px;}
.foot2 .btn{margin:0;flex:1;width:auto;}
.results-actions{display:flex;flex-direction:row;gap:0;width:100%;z-index:10;border-top:4px solid #b03020;margin-top:auto;}
.game-ctrl-btn{flex:1;padding:13px;background:#111;color:#fff;border:1px solid #333;border-right:none;font-size:0.82rem;font-weight:900;letter-spacing:0.12em;cursor:pointer;text-transform:uppercase;display:flex;align-items:center;justify-content:center;}
.game-ctrl-btn:last-child{border-right:1px solid #ddd;}
.tag-line{text-align:center;font-size:10px;color:#cccccc;letter-spacing:1.5px;margin-top:16px;text-transform:uppercase;font-weight:600;}
</style>
</head>

<script>
"use strict";

// ---------- Constantes / config ----------
var LAT_CORRECTION = 30; // ms, correccion de latencia silenciosa
var ANGLE_STEP = 4;      // grados que aumenta el angulo por cada diana
var ANGLE_MAX = 70;      // angulo maximo respecto a la vertical (0=recta abajo, 90=lateral)
var AIM_LINE_FRAC = 0.45; // linea de mira: la bola debe cruzarla antes de tocar una pared
var SPEED_RAMP = 1.0;    // aumento de velocidad de la 1a a la ultima diana (1.0 = +100%)
var LIMITE_ACCEL = 0.05; // modo limite: la velocidad sube un 5% por cada ensayo (infinito)
var TRAIL_LEN = 14;      // numero de posiciones guardadas para la estela
var BEST_RT = 250;       // ms -> velocidad 1.0
var WORST_RT = 1500;     // ms -> velocidad 0.0
var MACHINEGUN_TAPS = 3;   // toques seguidos para detectar metralleta
var MACHINEGUN_MS = 400;   // ventana en ms para esos toques

var MODES = {
  normal: {
    label: "NORMAL",
    red: false,
    desc: "Intercepta la diana en movimiento lo mas rapido y centrado posible. Si pulsas fuera de la diana, el ejercicio se anula.",
    rPct: 0.100, speedPct: 1.20, hitFactor: 1.45
  },
  extremo: {
    label: "EXTREMO",
    red: false,
    desc: "Como el modo Normal, pero salen dos bolas a la vez: una roja desde arriba y una negra desde abajo. La siguiente pareja no sale hasta que has pulsado las dos. En modo N salen N rojas y N negras.",
    rPct: 0.100, speedPct: 1.20, hitFactor: 1.45
  },
  limite: {
    label: "LIMITE",
    red: false,
    desc: "Sin numero fijo de ensayos: la velocidad aumenta poco a poco desde el inicio. Termina al pulsar fuera o cuando la bola toca el suelo. Tu marca es cuantos ensayos completes.",
    rPct: 0.100, speedPct: 0.95, hitFactor: 1.45,
    failOnFloor: true
  }
};

// ---------- Estado ----------
var state = {
  mode: "normal",
  count: 15,
  penaliza: false,
  trials: [],
  index: 0,
  balls: [],
  redCount: 0,
  blackCount: 0,
  active: false,
  running: false,
  lastTs: 0,
  gapTimer: null,
  rafId: 0,
  cronoStart: 0,
  cronoElapsed: 0
};

var rankFilter = { mode: "normal", count: 30 };
var savedName = "";
function buildPlayerName(ini, dep){
  var i = (ini || "").trim().toUpperCase().replace(/[^A-Z]/g, "").slice(0,3);
  if (!i) i = "RDS";
  return i + "-" + (dep || "OTR");
}
function limitPerName(list, maxPer){
  var counts = {}, out = [];
  for (var i=0;i<list.length;i++){
    var k = "k_" + ((list[i].name || "").toUpperCase());
    var n = counts[k] || 0;
    if (n < maxPer){ counts[k] = n + 1; out.push(list[i]); }
  }
  return out;
}
var hideDups = false;
var allScores = null;
var lastPlayed = null;

// ---------- Utilidades DOM ----------
function $(id){ return document.getElementById(id); }
function show(screenId){
  var s = document.querySelectorAll(".screen");
  for (var i=0;i<s.length;i++){ s[i].classList.remove("active"); }
  $(screenId).classList.add("active");
}

// ---------- localStorage seguro ----------
function lbKey(mode, count){ if (mode === "limite") return "coord1_lb_limite"; return "coord1_lb_" + mode + "_" + count; }
function safeGet(key){
  try { var v = window.localStorage.getItem(key); return v ? JSON.parse(v) : []; }
  catch(e){ return []; }
}
function safeSet(key, val){
  try { window.localStorage.setItem(key, JSON.stringify(val)); return true; }
  catch(e){ return false; }
}

// ---------- Audio (Web Audio API, tonos sinteticos) ----------
var audioCtx = null;
function initAudio(){
  if (audioCtx) return;
  try { var AC = window.AudioContext || window.webkitAudioContext; audioCtx = new AC(); }
  catch(e){ audioCtx = null; }
}
function tone(freq, dur, type, vol, when){
  if (!audioCtx) return;
  try {
    var t0 = audioCtx.currentTime + (when || 0);
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = type || "sine";
    o.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(vol || 0.18, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t0); o.stop(t0 + dur + 0.02);
  } catch(e){}
}
function play(fn){
  initAudio();
  if (audioCtx && audioCtx.state === "suspended"){ try { audioCtx.resume(); } catch(e){} }
  fn();
}
function clickNote(freq, t0, vol, dur){
  if (!audioCtx) return;
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  var lp = audioCtx.createBiquadFilter();
  lp.type = "lowpass"; lp.frequency.setValueAtTime(2000, t0); // calidez
  o.type = "sine";
  o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.014);          // ataque suave
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);    // cola tipo campana
  o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function soundClick(){
  play(function(){
    if (!audioCtx) return;
    try {
      var t0 = audioCtx.currentTime;
      clickNote(523.25, t0,        0.10, 0.20); // C5
      clickNote(659.25, t0 + 0.06, 0.09, 0.24); // E5 (se solapan -> acorde calido)
    } catch(e){}
  });
}
function soundHit(){ play(function(){ tone(900, 0.055, "sine", 0.22); }); } // un solo toque (agudo)
function soundMiss(){ play(function(){ tone(180, 0.11, "sawtooth", 0.18); }); } // un solo toque (grave)

// ---------- Canvas ----------
var canvas, ctx, dpr = 1, CW = 0, CH = 0;
function setupCanvas(){
  canvas = $("play");
  ctx = canvas.getContext("2d");
  resizeCanvas();
}
function resizeCanvas(){
  if (!canvas) return;
  var rect = canvas.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  CW = rect.width;
  CH = rect.height;
  canvas.width = Math.round(CW * dpr);
  canvas.height = Math.round(CH * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", function(){
  if ($("screen-game").classList.contains("active")) resizeCanvas();
});

// ---------- Logica de juego ----------
function cfg(){ return MODES[state.mode]; }
function cronoMode(){ return state.mode !== "limite" && !state.penaliza; }
function fmtClock(ms){ if (ms < 0) ms = 0; var tc = Math.floor(ms / 10); var cc = tc % 100; var ts = Math.floor(tc / 100); var sc = ts % 60; var mn = Math.floor(ts / 60); return mn + ":" + (sc < 10 ? "0" + sc : sc) + "." + (cc < 10 ? "0" + cc : cc); }
function minDim(){ return Math.min(CW, CH); }

function startGame(){
  lastPlayed = { mode: state.mode, count: state.count };
  state.trials = [];
  state.index = 0;
  state.redCount = 0;
  state.blackCount = 0;
  state.balls = [];
  state.tapTimes = [];
  state.fails = 0;
  var penalizaOn = (state.mode !== "limite") && state.penaliza;
  state.maxLives = penalizaOn ? ((state.mode === "extremo") ? 5 : 3) : 0;
  $("screen-game").classList.toggle("lim", state.mode === "limite");
  renderLives();
  updateLives();
  var cron = $("hud-crono"), livesEl = $("hud-lives");
  if (cronoMode()){
    if (cron){ cron.style.display = ""; var cv0 = $("hud-crono-val"); if (cv0) cv0.textContent = "0:00.00"; }
    if (livesEl) livesEl.style.display = "none";
  } else {
    if (cron) cron.style.display = "none";
    if (livesEl) livesEl.style.display = "";
  }
  state.active = false;
  show("screen-game");
  resizeCanvas();
  updateHud();
  if (!state.running){
    state.running = true;
    state.lastTs = performance.now();
    state.rafId = requestAnimationFrame(loop);
  }
  startCountdown();
}

function startCountdown(){
  state.active = false;
  state.balls = [];
  var token = (state.cdToken || 0) + 1;
  state.cdToken = token;
  var steps = ["3", "2", "1", "YA"];
  var i = 0;
  var cd = $("countdown"), num = $("countdown-num");
  cd.style.display = "flex";
  function tick(){
    if (state.cdToken !== token) return;
    if (!$("screen-game").classList.contains("active")){ cd.style.display = "none"; return; }
    if (i >= steps.length){ cd.style.display = "none"; beginPlay(token); return; }
    num.textContent = steps[i];
    beepCountdown(steps[i] === "YA");
    i++;
    setTimeout(tick, 700);
  }
  tick();
}

function beginPlay(token){
  if (token !== undefined && state.cdToken !== token) return;
  if (!$("screen-game").classList.contains("active")) return;
  state.active = true;
  state.cronoStart = performance.now();
  state.lastTs = performance.now();
  spawnRed();
  if (state.mode === "extremo") spawnBlack();
}

function beepCountdown(go){
  if (!audioCtx) return;
  try {
    var t = audioCtx.currentTime;
    if (go) clickNote(740, t, 0.12, 0.24);
    else clickNote(440, t, 0.10, 0.16);
  } catch(e){}
}

function ballSpeed(c, idx){
  if (state.mode === "limite"){
    return minDim() * c.speedPct * (1 + LIMITE_ACCEL * idx); // escalada continua e infinita
  }
  var prog = (state.count > 1) ? (idx / (state.count - 1)) : 0;
  return minDim() * c.speedPct * (1 + SPEED_RAMP * prog);
}

function makeBall(kind, idx){
  var c = cfg();
  var r = Math.max(20, minDim() * c.rPct);
  // posicion de salida: cualquier punto del borde superior (roja) o inferior (negra)
  var x = r + Math.random() * (CW - 2 * r);
  var y = (kind === "black") ? (CH - r - 4) : (64 + r + 4);
  // elegir lado de lanzamiento
  var side;
  if (idx < 5){ side = (idx % 2 === 0) ? 1 : -1; }
  else { side = (Math.random() < 0.5) ? 1 : -1; }
  // tope de angulo: que no toque la pared de ese lado antes de cruzar la linea de mira
  var lineY = 64 + AIM_LINE_FRAC * (CH - 64);
  var distToLine = Math.max(1, Math.abs(lineY - y));
  var distWall = (side > 0) ? (CW - r - x) : (x - r);
  if (distWall < 1) distWall = 1;
  var maxDegLine = Math.atan2(distWall, distToLine) * 180 / Math.PI * 0.95;
  var capDeg = Math.min(ANGLE_MAX, maxDegLine);
  // angulo respecto a la vertical
  var deg;
  if (idx < 5){ deg = Math.min(capDeg, ANGLE_STEP * idx); }
  else { deg = Math.random() * capDeg; }
  var ang = deg * Math.PI / 180;
  var speed = ballSpeed(c, idx);
  var vy = (kind === "black") ? (-Math.cos(ang) * speed) : (Math.cos(ang) * speed);
  return {
    kind: kind,
    color: (kind === "black") ? "#111111" : "#b03020",
    x: x, y: y,
    vx: Math.sin(ang) * speed * side,
    vy: vy,
    r: r,
    idx: idx,
    spawnTime: performance.now(),
    bounces: 0,
    slowed: false,
    trail: []
  };
}

function spawnRed(){ state.balls.push(makeBall("red", state.redCount)); state.redCount++; }
function spawnBlack(){ state.balls.push(makeBall("black", state.blackCount)); state.blackCount++; }

function loop(ts){
  var dt = (ts - state.lastTs) / 1000;
  if (dt > 0.05) dt = 0.05;
  state.lastTs = ts;
  ctx.clearRect(0, 0, CW, CH);

  if (state.active){
    var floorFail = cfg().failOnFloor;
    for (var i = 0; i < state.balls.length; i++){
      var t = state.balls[i];
      t.x += t.vx * dt;
      t.y += t.vy * dt;
      var topLimit = 64 + t.r;
      var bounced = false;
      if (t.x < t.r){ t.x = t.r; t.vx = Math.abs(t.vx); bounced = true; }
      if (t.x > CW - t.r){ t.x = CW - t.r; t.vx = -Math.abs(t.vx); bounced = true; }
      if (t.y < topLimit){ t.y = topLimit; t.vy = Math.abs(t.vy); bounced = true; }
      if (t.y > CH - t.r){
        if (floorFail){ endLimite("floor"); return; } // modo limite: el suelo termina la serie
        t.y = CH - t.r; t.vy = -Math.abs(t.vy); bounced = true;
      }
      if (bounced){
        t.bounces++;
        if (t.bounces >= 2 && !t.slowed){ t.vx *= 0.85; t.vy *= 0.85; t.slowed = true; }
      }
    }
    if (state.mode === "extremo") resolveBallCollisions();
    for (var di = 0; di < state.balls.length; di++){
      var d = state.balls[di];
      d.trail.push({ x: d.x, y: d.y });
      if (d.trail.length > TRAIL_LEN) d.trail.shift();
      drawBall(d);
    }
  }

  if (state.active && cronoMode()){
    var cel = $("hud-crono-val");
    if (cel) cel.textContent = fmtClock(performance.now() - state.cronoStart);
  }
  if (state.running){
    state.rafId = requestAnimationFrame(loop);
  }
}

function resolveBallCollisions(){
  var arr = state.balls;
  for (var i = 0; i < arr.length; i++){
    for (var j = i + 1; j < arr.length; j++){
      var a = arr[i], c = arr[j];
      var dx = c.x - a.x, dy = c.y - a.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist === 0){ dx = 0.01; dy = 0; dist = 0.01; }
      var minDist = a.r + c.r;
      if (dist < minDist){
        var nx = dx / dist, ny = dy / dist;
        var overlap = (minDist - dist) / 2;
        a.x -= nx * overlap; a.y -= ny * overlap;
        c.x += nx * overlap; c.y += ny * overlap;
        var velN = (a.vx - c.vx) * nx + (a.vy - c.vy) * ny;
        if (velN > 0){
          a.vx -= velN * nx; a.vy -= velN * ny;
          c.vx += velN * nx; c.vy += velN * ny;
        }
      }
    }
  }
}

function drawBall(t){
  var x = t.x, y = t.y, r = t.r;
  var black = (t.kind === "black");
  // estela: posiciones anteriores con opacidad y tamano decrecientes
  var tr = t.trail, n = tr.length;
  for (var s = 0; s < n - 1; s++){
    var f = (s + 1) / n;                 // 0 (mas antigua) -> 1 (mas reciente)
    ctx.globalAlpha = 0.30 * f * f;
    ctx.beginPath();
    ctx.arc(tr[s].x, tr[s].y, r * (0.48 + 0.50 * f), 0, Math.PI*2);
    ctx.fillStyle = black ? "#111111" : "#b03020";
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  // estilo: boton biselado (borde oscuro + cara con degradado + reborde de luz)
  var rimCol  = black ? "#050505" : "#6e1810";
  var faceTop = black ? "#9a9a9a" : "#d9614f";
  var faceMid = black ? "#333333" : "#b03020";
  var faceBot = black ? "#161616" : "#8a2015";
  // disco exterior (bisel) con sombra suave
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.28)";
  ctx.shadowBlur = r * 0.40;
  ctx.shadowOffsetY = r * 0.16;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = rimCol; ctx.fill();
  ctx.restore();
  // cara interior con degradado vertical
  var g = ctx.createLinearGradient(x, y - r*0.8, x, y + r*0.8);
  g.addColorStop(0, faceTop); g.addColorStop(0.5, faceMid); g.addColorStop(1, faceBot);
  ctx.beginPath(); ctx.arc(x, y, r*0.82, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();
  // reborde de luz superior
  ctx.beginPath();
  ctx.arc(x, y - r*0.06, r*0.82, Math.PI*1.1, Math.PI*1.9);
  ctx.lineWidth = r*0.08;
  ctx.strokeStyle = "rgba(255,255,255,0.45)";
  ctx.stroke();
}

// ---------- Toque ----------
function handleTap(clientX, clientY){
  if (!state.active || !state.balls.length) return;
  var rect = canvas.getBoundingClientRect();
  var px = clientX - rect.left;
  var py = clientY - rect.top;
  var now = performance.now();

  // anti-metralleta: varios toques muy seguidos anulan el ejercicio
  if (!state.tapTimes) state.tapTimes = [];
  state.tapTimes.push(now);
  while (state.tapTimes.length && now - state.tapTimes[0] > MACHINEGUN_MS) state.tapTimes.shift();
  if (state.tapTimes.length >= MACHINEGUN_TAPS){ annulGame("metralleta"); return; }

  // buscar la bola tocada (la mas cercana dentro de su zona)
  var hitBall = null, hitIdx = -1, bestDist = Infinity, bestPrec = 0;
  for (var i = 0; i < state.balls.length; i++){
    var t = state.balls[i];
    var dx = px - t.x, dy = py - t.y;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var hitRadius = t.r * cfg().hitFactor;
    if (dist <= hitRadius && dist < bestDist){
      bestDist = dist; hitBall = t; hitIdx = i;
      bestPrec = Math.max(0, 1 - dist / hitRadius);
    }
  }

  if (!hitBall){
    // fallo: tocar fuera de la bola (antes/despues). Descuenta una vida.
    soundMiss();
    flashTap(px, py, false);
    if (state.maxLives > 0){
      state.fails = (state.fails || 0) + 1;
      updateLives();
      if (state.fails >= state.maxLives){ endByFails(); }
    }
    return;
  }

  // acierto
  soundHit();
  var rtv = now - hitBall.spawnTime - LAT_CORRECTION;
  if (rtv < 1) rtv = 1;
  state.trials.push({ rt: rtv, prec: bestPrec, hit: true });
  state.index++;
  flashTap(px, py, true);

  var kind = hitBall.kind;
  state.balls.splice(hitIdx, 1);
  advanceStream(kind);
  updateHud();
}

function advanceStream(kind){
  if (state.mode === "limite"){
    spawnRed(); // infinito
    return;
  }
  if (state.mode === "normal"){
    if (state.redCount < state.count) spawnRed();
    checkFinish();
    return;
  }
  // extremo: pareja obligatoria; la siguiente pareja solo sale al pulsar las dos
  if (state.balls.length === 0 && state.redCount < state.count){
    spawnRed();
    spawnBlack();
  }
  checkFinish();
}

function checkFinish(){
  if (state.balls.length > 0) return;
  if (state.mode === "normal" && state.redCount >= state.count){ finishGame(); }
  else if (state.mode === "extremo" && state.redCount >= state.count && state.blackCount >= state.count){ finishGame(); }
}

function flashTap(x, y, hit){
  ctx.beginPath();
  ctx.arc(x, y, 16, 0, Math.PI*2);
  ctx.strokeStyle = hit ? "#b03020" : "#111111";
  ctx.lineWidth = 4;
  ctx.stroke();
}

function onTouch(e){
  e.preventDefault();
  if (e.touches && e.touches.length){
    handleTap(e.touches[0].clientX, e.touches[0].clientY);
  }
}
function onMouse(e){
  handleTap(e.clientX, e.clientY);
}

    if (fill) fill.style.width = pct + "%";

// ---------- Agregados / puntuacion ----------
function velNorm(rt){
  var v = (WORST_RT - rt) / (WORST_RT - BEST_RT);
  if (v < 0) v = 0; if (v > 1) v = 1;
  return v;
}
function computeAggregates(trials){
  if (!trials.length) return { index:0, avgRT:0, avgPrec:0, hits:0, total:0, worst:0 };
  var sumIdx = 0, sumPrec = 0, hits = 0, sumRThit = 0, worstRT = 0;
  for (var i=0;i<trials.length;i++){
    var tr = trials[i];
    var vn = velNorm(tr.rt);
    var idx = (0.5 * vn + 0.5 * tr.prec) * 100;
    sumIdx += idx;
    sumPrec += tr.prec;
    if (tr.hit){ hits++; sumRThit += tr.rt; if (tr.rt > worstRT) worstRT = tr.rt; }
  }
  return {
    index: sumIdx / trials.length,
    avgPrec: (sumPrec / trials.length) * 100,
    avgRT: hits ? (sumRThit / hits) : 0,
    hits: hits,
    total: trials.length,
    worst: worstRT
  };
}

function renderLives(){
  var lv = $("hud-lives");

  var n = state.maxLives || 0;
  var html = "";
  for (var i = 0; i < n; i++) html += '<span class="life"></span>';
  lv.innerHTML = html;
}
function updateLives(){
  var lv = $("hud-lives");
  if (!lv) return;
  var dots = lv.querySelectorAll(".life");
  var f = state.fails || 0;
  var remaining = dots.length - f;
  for (var i = 0; i < dots.length; i++){
    dots[i].classList.toggle("lost", (i >= dots.length - f));
    dots[i].classList.remove("blink-off");
  }
  if (state.blinkTimer){ clearInterval(state.blinkTimer); state.blinkTimer = null; }
  if (remaining === 1){
    var dot = dots[0];
    state.blinkTimer = setInterval(function(){
      if (dot) dot.classList.toggle("blink-off");
    }, 180);
  }
}
function finishGame(){
  stopLoop();
  state.cronoElapsed = performance.now() - state.cronoStart;
  state.noSave = false;
  renderResults(false, false);
  showFinishTransition();
}

}

// ---------- Render resultados ----------
function drawRTChart(id, trials){
  var cv = document.getElementById(id);
  if (!cv || !trials || trials.length < 2) return;
  var rts = [];
  for (var a=0;a<trials.length;a++) rts.push(trials[a].rt);
  var n = rts.length;
  var dpr = window.devicePixelRatio || 1;
  var W = cv.clientWidth || (cv.parentNode ? cv.parentNode.clientWidth : 300) || 300;
  var H = cv.clientHeight || 150;
  cv.width = Math.round(W*dpr); cv.height = Math.round(H*dpr);
  var c = cv.getContext("2d"); c.setTransform(dpr,0,0,dpr,0,0);
  c.clearRect(0,0,W,H);
  var padL=10, padR=10, padT=12, padB=20;
  var plotW = W - padL - padR, plotH = H - padT - padB;
  var mn = Math.min.apply(null, rts), mx = Math.max.apply(null, rts);
  if (mx - mn < 40){ var mid=(mn+mx)/2; mn=mid-20; mx=mid+20; }
  var range = mx - mn;
  function X(i){ return padL + (n===1 ? plotW/2 : (i/(n-1))*plotW); }
  function Y(v){ return padT + plotH - ((v - mn)/range)*plotH; }
  // area bajo la linea
  c.beginPath();
  c.moveTo(X(0), padT+plotH);
  for (var i=0;i<n;i++) c.lineTo(X(i), Y(rts[i]));
  c.lineTo(X(n-1), padT+plotH); c.closePath();
  c.fillStyle = "rgba(176,48,32,0.10)"; c.fill();
  // linea
  c.beginPath();
  for (var j=0;j<n;j++){ if(j===0) c.moveTo(X(j),Y(rts[j])); else c.lineTo(X(j),Y(rts[j])); }
  c.strokeStyle = "#b03020"; c.lineWidth = 2; c.lineJoin = "round"; c.stroke();
  // puntos
  c.fillStyle = "#b03020";
  var dotR = n > 25 ? 1.8 : 3;
  for (var k=0;k<n;k++){ c.beginPath(); c.arc(X(k), Y(rts[k]), dotR, 0, Math.PI*2); c.fill(); }
  // etiquetas eje X
  c.fillStyle = "#aaaaaa"; c.font = "9px -apple-system,Arial,sans-serif"; c.textAlign = "center";
  var step = (n <= 12) ? 1 : Math.ceil(n/8);
  for (var m=0;m<n;m+=step) c.fillText("R"+(m+1), X(m), H-6);
  if ((n-1) % step !== 0) c.fillText("R"+n, X(n-1), H-6);
}

function numOk(v){ return (typeof v === "number" && isFinite(v)) ? v : 0; }

function pushScore(rec){
  // respaldo local (offline / sin Firebase)
  try {
    var key = lbKey(rec.mode, rec.count);
    var list = safeGet(key);
    list.push(rec);
    if (rec.mode === "limite") list.sort(function(a,b){ if (b.trials !== a.trials) return b.trials - a.trials; return a.avgRT - b.avgRT; });
    else list.sort(function(a,b){ return a.avgRT - b.avgRT; });
    if (list.length > 50) list = list.slice(0, 50);
    safeSet(key, list);
  } catch (e) {}
  // ranking global
  if (window.RDS_DB && window.RDS_DB.ok) return window.RDS_DB.add(rec);
  return Promise.resolve();
}

function saveScoreLimite(name, agg){
  return pushScore({
    mode: "limite",
    count: 0,
    name: name,
    avgRT: numOk(agg.avgRT ? Math.round(agg.avgRT) : 0),
    avgPrec: numOk(Math.round(agg.avgPrec)),
    index: numOk(Math.round(agg.index)),
    trials: numOk(state.index),
    date: Date.now()
  });
}

function saveScore(name, agg){
  return pushScore({
    mode: state.mode,
    count: state.count,
    name: name,
    avgRT: numOk(agg.avgRT ? Math.round(agg.avgRT) : 0),
    avgPrec: numOk(Math.round(agg.avgPrec)),
    index: numOk(Math.round(agg.index)),
    trials: numOk(state.count),
    date: Date.now()
  });
}

// ---------- Ranking ----------
function renderRanking(){
  var isLim = (rankFilter.mode === "limite");
  var host = $("rk-table");
  var list;
  if (allScores){
    list = allScores.filter(function(r){
      if (r.mode !== rankFilter.mode) return false;
      if (isLim) return true;
      return r.count === rankFilter.count;
    });
  } else {
    list = safeGet(lbKey(rankFilter.mode, rankFilter.count));
  }
  if (!list.length){
    host.innerHTML = '<div class="rk-empty">Sin registros en ' + MODES[rankFilter.mode].label + (isLim ? '' : (' - ' + rankFilter.count)) + ' todavia.</div>';
    return;
  }
  // ordenar para mostrar (defensivo, tambien para registros antiguos)
  if (isLim){
    list.sort(function(a,b){ if (b.trials !== a.trials) return (b.trials||0) - (a.trials||0); return (a.avgRT||0) - (b.avgRT||0); });
  } else {
    list.sort(function(a,b){ return (a.avgRT||0) - (b.avgRT||0); });
  }
  if (hideDups){
    var seen = {}, uniq = [];
    for (var d=0; d<list.length; d++){
      var nmk = "k_" + (list[d].name || "").toUpperCase();
      if (seen[nmk]) continue;
      seen[nmk] = true; uniq.push(list[d]);
    }
    list = uniq;
  }
  // maximo 3 por nombre (sus 3 mejores marcas), en local y global
  list = limitPerName(list, 3);
  var html;
  if (isLim){
    html = '<table class="rk"><thead><tr><th>#</th><th>Nombre</th><th>Ensayos</th><th>Reaccion</th><th>Prec</th></tr></thead><tbody>';
    for (var i=0;i<list.length;i++){
      var r = list[i];
      var cls = i===0 ? "top1" : (i===1 ? "top2" : (i===2 ? "top3" : ""));
      html += '<tr class="' + cls + '">';
      html += '<td>' + (i+1) + '</td>';
      html += '<td class="nm">' + escapeHtml(r.name) + '</td>';
      html += '<td class="idx">' + (r.trials != null ? r.trials : "-") + '</td>';
      html += '<td>' + (r.avgRT || "-") + '</td>';
      html += '<td>' + (r.avgPrec != null ? r.avgPrec + '%' : "-") + '</td>';
      html += '</tr>';
    }
  } else {
    html = '<table class="rk"><thead><tr><th>#</th><th>Nombre</th><th>Reaccion</th><th>Prec</th><th>Indice</th></tr></thead><tbody>';
    for (var j=0;j<list.length;j++){
      var r2 = list[j];
      var cls2 = j===0 ? "top1" : (j===1 ? "top2" : (j===2 ? "top3" : ""));
      html += '<tr class="' + cls2 + '">';
      html += '<td>' + (j+1) + '</td>';
      html += '<td class="nm">' + escapeHtml(r2.name) + '</td>';
      html += '<td class="idx">' + (r2.avgRT || "-") + '</td>';
      html += '<td>' + (r2.avgPrec != null ? r2.avgPrec + '%' : "-") + '</td>';
      html += '<td>' + (r2.index != null ? r2.index : "-") + '</td>';
      html += '</tr>';
    }
  }
  html += '</tbody></table>';
  host.innerHTML = html;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c];
  });
}

  bindSelector("count-row", "data-count", function(v){ state.count = parseInt(v,10); });
  bindSelector("fallos-row", "data-pen", function(v){ state.penaliza = (v === "1"); });

  bindSelector("rk-mode", "data-mode", function(v){ rankFilter.mode = v; $("rk-count").style.display = (v === "limite") ? "none" : ""; renderRanking(); });
  bindSelector("rk-count", "data-count", function(v){ rankFilter.count = parseInt(v,10); renderRanking(); });

  $("btn-start").addEventListener("click", startGame);
  $("btn-goranking").addEventListener("click", openRanking);

  // nombre para el ranking: iniciales + deporte -> INI-DEP
  var sIni = safeGet("coord1_initials");
  var sDep = safeGet("coord1_sport");
  var savedIni = (typeof sIni === "string") ? sIni : "";
  var savedDep = (typeof sDep === "string" && sDep) ? sDep : "OTR";
  if (savedIni) $("home-initials").value = savedIni;
  $("home-sport").value = savedDep;
  savedName = buildPlayerName(savedIni, savedDep);
  function persistPlayerName(){
    var ini = ($("home-initials").value || "").trim().toUpperCase().replace(/[^A-Z]/g, "").slice(0,3);
    var dep = $("home-sport").value || "OTR";
    savedName = buildPlayerName(ini, dep);
    safeSet("coord1_initials", ini);
    safeSet("coord1_sport", dep);
    safeSet("coord1_name", savedName);
  }
  $("home-initials").addEventListener("input", persistPlayerName);
  $("home-sport").addEventListener("change", persistPlayerName);

  $("hud-home").addEventListener("click", function(){ stopLoop(); show("screen-home"); });
  $("hud-repeat").addEventListener("click", function(){ stopLoop(); startGame(); });

  $("rk-dedup").addEventListener("click", function(){
    hideDups = !hideDups;
    var b = $("rk-dedup");
    b.textContent = hideDups ? "MOSTRAR REPETIDOS" : "OCULTAR REPETIDOS";
    b.classList.toggle("on", hideDups);
    renderRanking();
  });

  // canvas input
  var c = $("play");
  c.addEventListener("touchstart", onTouch, { passive:false });
  c.addEventListener("mousedown", onMouse);
  document.addEventListener("gesturestart", function(e){ e.preventDefault(); }, { passive:false });
  document.addEventListener("gesturechange", function(e){ e.preventDefault(); }, { passive:false });
  document.addEventListener("gestureend", function(e){ e.preventDefault(); }, { passive:false });
  var __gs = document.getElementById("screen-game");
  if (__gs) __gs.addEventListener("touchmove", function(e){ e.preventDefault(); }, { passive:false });

  refreshModeDesc();
}

function syncRankFilters(){
  var mr = $("rk-mode").querySelectorAll(".opt");
  for (var i=0;i<mr.length;i++) mr[i].classList.toggle("sel", mr[i].getAttribute("data-mode")===rankFilter.mode);
  var cr = $("rk-count").querySelectorAll(".opt");
  for (var j=0;j<cr.length;j++) cr[j].classList.toggle("sel", parseInt(cr[j].getAttribute("data-count"),10)===rankFilter.count);
}

document.addEventListener("DOMContentLoaded", init);

// Service Worker para uso sin conexion
if ("serviceWorker" in navigator) {
  var swRefreshing = false;
  var hadController = !!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener("controllerchange", function(){
    if (!hadController) return;
    if (swRefreshing) return;
    swRefreshing = true;
    window.location.reload();
  });
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").then(function(reg){
      reg.update();
      document.addEventListener("visibilitychange", function(){
        if (document.visibilityState === "visible") reg.update();
      });
      if (reg.waiting && navigator.serviceWorker.controller) {
        reg.waiting.postMessage({action:"skipWaiting"});
      }
      reg.addEventListener("updatefound", function(){
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", function(){
          if (nw.state === "installed" && navigator.serviceWorker.controller) {
            nw.postMessage({action:"skipWaiting"});
          }
        });
      });
    }).catch(function(){});
  });
}
</script>
